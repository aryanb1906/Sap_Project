  </defs>
  <rect width="1200" height="300" rx="32" fill="url(#bg)"/>
  <circle cx="1080" cy="62" r="120" fill="#ffffff" opacity="0.08"/>
  <circle cx="1040" cy="220" r="150" fill="#22c55e" opacity="0.08"/>
  <rect x="60" y="54" width="520" height="192" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18"/>
