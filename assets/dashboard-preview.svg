      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
